<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Оператор | КРИСТИНА.AI CRM</title>
<style>
:root{--bg:#0b132b;--panel:rgba(15,23,42,0.85);--acc:#3b82f6;--soft:#93c5fd;--text:#e2e8f0}
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,-apple-system,sans-serif}
body{background:var(--bg);color:var(--text);height:100vh;display:flex;overflow:hidden}
.sidebar{width:320px;background:var(--panel);border-right:1px solid rgba(255,255,255,0.08);display:flex;flex-direction:column}
.sidebar h2{padding:20px;font-size:1.3rem;border-bottom:1px solid rgba(255,255,255,0.08);display:flex;justify-content:space-between;align-items:center}
#chatList{flex:1;overflow-y:auto;padding:10px}
.chat-item{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:14px;margin-bottom:8px;cursor:pointer;transition:0.2s}
.chat-item:hover,.chat-item.active{background:rgba(59,130,246,0.15);border-color:rgba(96,165,250,0.4);transform:translateX(4px)}
.meta{display:flex;justify-content:space-between;font-size:12px;opacity:0.6;margin-bottom:4px}
.status{font-size:11px;padding:2px 8px;border-radius:12px;background:rgba(234,179,8,0.2);color:#fbbf24}
.status.active{background:rgba(34,197,94,0.2);color:#4ade80}
.preview{font-size:13px;opacity:0.7;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.main{flex:1;display:flex;flex-direction:column;background:rgba(0,0,0,0.2)}
#chatHeader{padding:20px;border-bottom:1px solid rgba(255,255,255,0.08);display:flex;justify-content:space-between;align-items:center}
#chatArea{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px}
#footer{padding:16px;background:var(--panel);border-top:1px solid rgba(255,255,255,0.08);display:flex;gap:10px}
#input{flex:1;padding:12px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);background:rgba(0,0,0,0.3);color:var(--text);outline:none}
#send{padding:12px 24px;border:none;border-radius:10px;background:linear-gradient(145deg,#3b82f6,#1d4ed8);color:#fff;font-weight:600;cursor:pointer}
.msg{max-width:75%;padding:10px 14px;border-radius:12px;line-height:1.4}
.msg.vis{background:linear-gradient(145deg,#1e3a8a,#1d4ed8);color:#dbeafe;align-self:flex-start}
.msg.op{background:rgba(59,130,246,0.25);color:var(--soft);align-self:flex-end}
.msg.sys{background:rgba(255,255,255,0.05);color:#94a3b8;align-self:center;font-size:12px;padding:4px 12px;border-radius:20px}
.empty{display:flex;align-items:center;justify-content:center;height:100%;opacity:0.4;font-size:14px}
.nav a{color:var(--soft);text-decoration:none;font-size:13px;margin-left:12px}
.nav a:hover{color:#3b82f6}
</style>
</head>
<body>
<div class="sidebar">
 <h2>📂 Диалоги</h2>
 <div id="chatList"></div>
</div>
<div class="main">
 <div id="chatHeader"><span id="title">Выберите диалог</span><span class="nav"><a href="#" onclick="logout()">🚪 Выйти</a></span></div>
 <div id="chatArea"><div class="empty">💬 Выберите чат слева</div></div>
 <div id="footer"><input id="input" placeholder="Введите ответ..." disabled><button id="send" disabled>Отправить</button></div>
</div>
<script>
// ✅ Проверка токена
const token = localStorage.getItem('token');
const isAdmin = localStorage.getItem('isAdmin') === 'true';
if (!token) window.location.href = '/login.html';

// ✅ ПРАВИЛЬНЫЙ API URL
const API = location.origin + '/api';
let activeChatId = null;
let pollInterval = null;

// Загрузка чатов
async function loadChats() {
  try {
    const r = await fetch(API + '/chats', {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    if (r.status === 401) { logout(); return; }
    
    const chats = await r.json();
    const el = document.getElementById('chatList');
    
    if (!chats.length) {
      el.innerHTML = '<div style="text-align:center;opacity:0.5;padding:30px">Нет диалогов</div>';
      return;
    }
    
    el.innerHTML = chats.map(c => `
      <div class="chat-item ${c.id === activeChatId ? 'active' : ''}" onclick="openChat(${c.id}, '${c.site}')">
        <div class="meta">
          <span>${c.site}</span>
          <span class="status ${c.status === 'active' ? 'active' : ''}">${c.status === 'active' ? 'Онлайн' : 'Ожидание'}</span>
        </div>
        <div class="preview">ID: ${c.id} | ${new Date(c.time).toLocaleTimeString()}</div>
      </div>
    `).join('');
  } catch (e) {
    console.error('Ошибка загрузки чатов:', e);
  }
}

// Открытие чата
async function openChat(id, site) {
  activeChatId = id;
  document.getElementById('title').textContent = site;
  document.getElementById('input').disabled = false;
  document.getElementById('send').disabled = false;
  
  // Если чат в ожидании — принимаем
  const chat = await fetch(API + '/chats', { headers: { 'Authorization': `Bearer ${token}` } }).then(r => r.json());
  const current = chat.find(c => c.id === id);
  if (current && current.status === 'waiting') {
    await fetch(API + '/sites/' + id + '/approve', {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${token}` }
    });
  }
  
  loadMessages();
  
  // ✅ Polling вместо WebSocket (проще и надёжнее)
  if (pollInterval) clearInterval(pollInterval);
  pollInterval = setInterval(loadMessages, 5000);
}

// Загрузка сообщений
async function loadMessages() {
  if (!activeChatId) return;
  try {
    const r = await fetch(API + '/messages/' + activeChatId, {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    const msgs = await r.json();
    const el = document.getElementById('chatArea');
    el.innerHTML = msgs.map(m => `
      <div class="msg ${m.sender === 'visitor' ? 'vis' : m.sender === 'admin' ? 'sys' : 'op'}">
        ${m.text}
      </div>
    `).join('');
    el.scrollTop = el.scrollHeight;
  } catch (e) {
    console.error('Ошибка загрузки сообщений:', e);
  }
}

// Отправка сообщения
function sendMessage() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text || !activeChatId) return;
  
  fetch(API + '/send', {
    method: 'POST',
    headers: { 
      'Authorization': `Bearer ${token}`,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ chat_id: activeChatId, text, sender: 'operator' })
  }).then(() => {
    input.value = '';
    loadMessages();
  });
}

// Выход
function logout() {
  localStorage.clear();
  window.location.href = '/login.html';
}

// События
document.getElementById('send').onclick = sendMessage;
document.getElementById('input').onkeypress = e => {
  if (e.key === 'Enter') sendMessage();
};

// Запуск
loadChats();
setInterval(loadChats, 10000);
</script>
</body>
</html>
