<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Панель | КРИСТИНА.AI CRM</title>
<link rel="icon" type="image/png" href="favicon.png">
<style>
:root{--bg:#0b132b;--panel:rgba(15,23,42,0.85);--acc:#3b82f6;--text:#e2e8f0;--success:#10b981;--danger:#ef4444}
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui}
body{background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
#mobileMenu{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:1000;padding:20px}
#mobileMenu.active{display:block}
.menu-item{padding:15px;border-bottom:1px solid rgba(255,255,255,0.1);cursor:pointer}
.header{background:var(--panel);padding:12px 16px;display:flex;justify-content:space-between;align-items:center}
.header h2{font-size:1.1rem}
.logo{width:28px;height:28px}
.menu-btn{background:var(--acc);border:none;color:#fff;padding:8px 12px;border-radius:6px;cursor:pointer}
.desktop-nav{display:none}
@media(min-width:768px){.desktop-nav{display:flex;gap:6px}.menu-btn{display:none}}
.btn{padding:6px 12px;background:var(--acc);color:#fff;border:none;border-radius:6px;cursor:pointer}
.btn-red{background:var(--danger)}
.btn-green{background:var(--success)}
.container{padding:16px;flex:1;overflow:hidden}
.section{display:none;height:100%}
.section.active{display:flex;flex-direction:column}

/* ЧАТЫ: Слева список (фикс), Справа чат (остальное) */
.chat-container{display:grid;grid-template-columns:250px 1fr;gap:16px;height:100%}
.chat-list{background:var(--panel);border-radius:12px;overflow:hidden;display:flex;flex-direction:column}
.chat-list-header{padding:14px;border-bottom:1px solid rgba(255,255,255,0.1);font-weight:600}
.chat-items{flex:1;overflow-y:auto}
.chat-item{padding:12px;border-bottom:1px solid rgba(255,255,255,0.05);cursor:pointer}
.chat-item:hover,.chat-item.active{background:rgba(59,130,246,0.2)}
.chat-window{background:var(--panel);border-radius:12px;display:flex;flex-direction:column}
.chat-header{padding:14px;border-bottom:1px solid rgba(255,255,255,0.1)}
.chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
.chat-input{padding:12px;border-top:1px solid rgba(255,255,255,0.1);display:flex;gap:8px}
.chat-input input{flex:1;padding:10px;border-radius:6px;border:1px solid rgba(255,255,255,0.1);background:rgba(0,0,0,0.3);color:#fff}
.msg{max-width:80%;padding:10px;border-radius:12px}
.msg.visitor{background:#1e3a8a;color:#fff;align-self:flex-start}
.msg.operator{background:var(--acc);color:#fff;align-self:flex-end}

.card{background:var(--panel);border-radius:12px;padding:16px;margin-bottom:16px}
.card h3{margin-bottom:14px}
.form-group{margin-bottom:14px}
.form-group label{display:block;margin-bottom:6px;color:#94a3b8}
.form-group input,.form-group textarea{width:100%;padding:10px;border-radius:6px;border:1px solid rgba(255,255,255,0.1);background:rgba(0,0,0,0.3);color:#fff}
.switch{position:relative;display:inline-block;width:44px;height:24px}
.switch input{opacity:0;width:0;height:0}
.slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#444;border-radius:24px}
.slider:before{position:absolute;content:"";height:18px;width:18px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s}
input:checked+.slider{background:var(--success)}
input:checked+.slider:before{transform:translateX(20px)}
.site-item{padding:12px;border-bottom:1px solid rgba(255,255,255,0.05);display:flex;justify-content:space-between;align-items:center}
.code-box{background:rgba(0,0,0,0.4);padding:10px;border-radius:6px;font-family:monospace;font-size:0.8rem;margin:10px 0}
.tabs{display:flex;gap:4px;margin-bottom:16px}
.tab{flex:1;padding:8px;text-align:center;background:rgba(255,255,255,0.05);border-radius:6px;cursor:pointer}
.tab.active{background:var(--acc)}
.tab-content{display:none}
.tab-content.active{display:block}
</style>
</head>
<body>

<div id="mobileMenu">
  <div style="display:flex;justify-content:space-between;margin-bottom:20px"><h3>Меню</h3><button class="btn btn-red" onclick="toggleMenu()">✕</button></div>
  <div class="menu-item" onclick="showSection('chats');toggleMenu()">💬 Чаты</div>
  <div class="menu-item" onclick="showSection('sites');toggleMenu()">🌐 Сайты</div>
  <div class="menu-item" onclick="showSection('ai-manager');toggleMenu()">🤖 AI</div>
  <div class="menu-item" id="adminBtnMob" onclick="showSection('admin');toggleMenu()" style="display:none">👑 Админ</div>
  <div class="menu-item" onclick="showSection('profile');toggleMenu()">👤 Профиль</div>
  <div class="menu-item" onclick="logout();toggleMenu()">🚪 Выйти</div>
</div>

<div class="header">
  <h2><img src="favicon.png" class="logo"> КРИСТИНА.AI CRM</h2>
  <button class="menu-btn" onclick="toggleMenu()">Меню</button>
  <div class="desktop-nav">
    <button class="btn" onclick="showSection('chats')">💬</button>
    <button class="btn" onclick="showSection('sites')">🌐</button>
    <button class="btn" onclick="showSection('ai-manager')">🤖</button>
    <button class="btn" id="adminBtn" onclick="showSection('admin')" style="display:none">👑</button>
    <button class="btn" onclick="showSection('profile')">👤</button>
    <button class="btn btn-red" onclick="logout()">🚪</button>
  </div>
</div>

<div class="container">
  <div id="chats" class="section active">
    <div class="chat-container">
      <div class="chat-list">
        <div class="chat-list-header">📂 Диалоги</div>
        <div class="chat-items" id="chatList"></div>
      </div>
      <div class="chat-window">
        <div class="chat-header" id="chatTitle">Выберите чат</div>
        <div class="chat-messages" id="chatMessages"><div style="text-align:center;opacity:0.5;margin-top:50px">Выберите диалог слева</div></div>
        <div class="chat-input"><input type="text" id="msgInput" placeholder="Ответ..." disabled><button class="btn" id="sendBtn" onclick="sendMessage()" disabled>➤</button></div>
      </div>
    </div>
  </div>

  <div id="sites" class="section">
    <div class="card"><h3>🌐 Добавить сайт</h3><div style="display:flex;gap:8px"><input type="text" id="siteUrl" placeholder="https://..."><button class="btn" onclick="addSite()">Добавить</button></div></div>
    <div class="card"><h3>📋 Код</h3><div class="code-box" id="widgetCode">Ожидание...</div><button class="btn" onclick="copyCode()">Копировать</button></div>
    <div class="card" id="siteList"><h3>Сайты</h3><p>Загрузка...</p></div>
  </div>

  <div id="ai-manager" class="section">
    <div class="card">
      <h3>🤖 AI Настройки</h3>
      <div class="tabs"><div class="tab active" onclick="switchTab('web')">Веб</div><div class="tab" onclick="switchTab('tg')">Telegram</div></div>
      
      <div id="tab-web" class="tab-content active">
        <div class="form-group"><label>Имя</label><input type="text" id="aiName"></div>
        <div class="form-group"><label>Характер</label><textarea id="aiBehavior" rows="3"></textarea></div>
        <div class="form-group"><label>База знаний</label><textarea id="aiKnowledge" rows="3"></textarea></div>
        <div class="form-group"><label>Запреты</label><textarea id="aiForbidden" rows="2"></textarea></div>
        <div style="display:flex;justify-content:space-between;align-items:center;padding:10px;background:rgba(255,255,255,0.05);border-radius:6px;margin-bottom:15px">
          <span>Включить на сайте</span>
          <label class="switch"><input type="checkbox" id="aiWebToggle"><span class="slider"></span></label>
        </div>
        <button class="btn btn-green" style="width:100%" onclick="saveAI()">💾 Сохранить</button>
      </div>

      <div id="tab-tg" class="tab-content">
        <div class="form-group"><label>Токен бота</label><input type="text" id="tgToken"></div>
        <div class="form-group"><label>Chat ID</label><input type="text" id="tgChatId"></div>
        <div style="display:flex;justify-content:space-between;align-items:center;padding:10px;background:rgba(255,255,255,0.05);border-radius:6px;margin-bottom:15px">
          <span>Включить в Telegram</span>
          <label class="switch"><input type="checkbox" id="aiTgToggle"><span class="slider"></span></label>
        </div>
        <button class="btn btn-green" style="width:100%" onclick="saveAI()">💾 Сохранить</button>
      </div>
    </div>
  </div>

  <div id="admin" class="section">
    <div class="card"><h3>👥 Пользователи</h3><div id="userList"></div></div>
  </div>

  <div id="profile" class="section">
    <div class="card"><h3>👤 Профиль</h3><div class="form-group"><label>Логин</label><input type="text" id="profileUser" readonly></div><div class="form-group"><label>Новый пароль</label><input type="password" id="newPass"></div><button class="btn" onclick="changePass()">Сменить</button></div>
    <div class="card"><h3>🔔 Telegram</h3><div class="form-group"><label>Chat ID</label><input type="text" id="profTgId"></div><div class="form-group"><label>Токен</label><input type="text" id="profTgToken"></div><button class="btn btn-green" onclick="saveProfTg()">Сохранить</button></div>
  </div>
</div>

<script>
const API = location.origin + '/api';
const token = localStorage.getItem('token');
const isAdmin = localStorage.getItem('isAdmin') === 'true';
let activeChat = null;
let poll = null;

if(!token) location.href='/index.html';
if(isAdmin){document.getElementById('adminBtn').style.display='inline-block';document.getElementById('adminBtnMob').style.display='block';}

function toggleMenu(){document.getElementById('mobileMenu').classList.toggle('active')}
function showSection(id){
  document.querySelectorAll('.section').forEach(e=>e.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(id==='chats') loadChats();
  if(id==='sites') loadSites();
  if(id==='ai-manager') loadAI();
  if(id==='admin') loadUsers();
  if(id==='profile') loadProfile();
}
function switchTab(t){
  document.querySelectorAll('.tab').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(e=>e.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('tab-'+t).classList.add('active');
}

async function req(url, m='GET', b=null){
  const o={method:m,headers:{'Authorization':`Bearer ${token}`,'Content-Type':'application/json'}};
  if(b) o.body=JSON.stringify(b);
  const r=await fetch(API+url,o);
  if(r.status===401){logout();return null;}
  return r.json();
}

function loadChats(){
  req('/chats').then(d=>{
    if(!d) return;
    document.getElementById('chatList').innerHTML = d.map(c=>`<div class="chat-item ${c.id===activeChat?'active':''}" onclick="openChat(${c.id},'${c.site}')"><div>${c.site}</div><div style="font-size:0.8rem;opacity:0.7">${c.status}</div></div>`).join('');
  });
}
function openChat(id, site){
  activeChat=id; document.getElementById('chatTitle').innerText=site;
  document.getElementById('msgInput').disabled=false; document.getElementById('sendBtn').disabled=false;
  loadMsgs();
  if(poll) clearInterval(poll);
  poll=setInterval(loadMsgs, 3000);
}
function loadMsgs(){
  if(!activeChat) return;
  req(`/messages/${activeChat}`).then(d=>{
    if(!d) return;
    document.getElementById('chatMessages').innerHTML = d.map(m=>`<div class="msg ${m.sender}">${m.text}</div>`).join('');
    document.getElementById('chatMessages').scrollTop=9999;
  });
}
function sendMessage(){
  const t=document.getElementById('msgInput').value;
  if(!t||!activeChat) return;
  req('/send','POST',{chat_id:activeChat,text:t,sender:'operator'}).then(()=>{
    document.getElementById('msgInput').value=''; loadMsgs();
  });
}

function loadSites(){
  req('/sites').then(d=>{
    if(!d) return;
    let html='<h3>Сайты</h3>';
    let code='';
    d.forEach(s=>{
      if(s.status==='active') code=`<script>window.KRISTINA_API_KEY='${s.api_key}';var s=document.createElement('script');s.src='${location.origin}/widget.js';document.body.appendChild(s);<\/script>`;
      html+=`<div class="site-item"><div>${s.url} <span style="color:${s.status==='active'?'#10b981':'#fbbf24'}">●</span></div></div>`;
    });
    document.getElementById('siteList').innerHTML=html;
    document.getElementById('widgetCode').innerText = code || 'Ожидает одобрения';
  });
}
function addSite(){
  const u=document.getElementById('siteUrl').value;
  if(!u) return;
  req('/sites','POST',{url:u}).then(()=>{document.getElementById('siteUrl').value='';loadSites();});
}
function copyCode(){
  const c=document.getElementById('widgetCode').innerText;
  if(c.includes('Ожидает')) return alert('Не одобрен');
  navigator.clipboard.writeText(c); alert('Скопировано');
}

function loadAI(){
  req('/ai/get').then(d=>{
    if(!d) return;
    document.getElementById('aiName').value=d.name||'';
    document.getElementById('aiBehavior').value=d.behavior||'';
    document.getElementById('aiKnowledge').value=d.knowledge_base||'';
    document.getElementById('aiForbidden').value=d.forbidden||'';
    document.getElementById('aiWebToggle').checked = d.is_active_web || false;
    document.getElementById('aiTgToggle').checked = d.is_active_telegram || false;
  });
}
function saveAI(){
  const data={
    name:document.getElementById('aiName').value,
    behavior:document.getElementById('aiBehavior').value,
    knowledge_base:document.getElementById('aiKnowledge').value,
    forbidden:document.getElementById('aiForbidden').value,
    is_active_web:document.getElementById('aiWebToggle').checked,
    is_active_telegram:document.getElementById('aiTgToggle').checked
  };
  // Добавляем токены если заполнены в профиле или тут (упрощено)
  req('/ai/setup','POST',data).then(r=>{
    if(r && r.ok) alert('Сохранено!');
    else alert('Ошибка');
  });
}

function loadUsers(){
  req('/admin/users').then(d=>{
    if(!d) return;
    document.getElementById('userList').innerHTML = d.map(u=>`<div style="padding:10px;border-bottom:1px solid #333;display:flex;justify-content:space-between"><span>${u.username}</span><button class="btn ${u.is_active?'btn-red':'btn-green'}" onclick="toggleU(${u.id})">${u.is_active?'Off':'On'}</button></div>`).join('');
  });
}
function toggleU(id){ req('/admin/toggle_user','POST',{user_id:id}).then(loadUsers); }

function loadProfile(){
  document.getElementById('profileUser').value = localStorage.getItem('username')||'';
}
function changePass(){
  const p=document.getElementById('newPass').value;
  if(p.length<4) return alert('Мин 4 символа');
  req('/change_password','POST',{password:p}).then(r=>{if(r.ok){alert('OK');document.getElementById('newPass').value='';}});
}
function saveProfTg(){
  const id=document.getElementById('profTgId').value;
  const tok=document.getElementById('profTgToken').value;
  req('/admin/save_chat_id','POST',{chat_id:id}).then(()=>req('/telegram/setup','POST',{token:tok,active:true}).then(()=>alert('OK')));
}

function logout(){localStorage.clear();location.href='/index.html';}
document.getElementById('msgInput').onkeypress=e=>{if(e.key==='Enter')sendMessage();};

loadProfile();
showSection('chats');
</script>
</body>
</html>
