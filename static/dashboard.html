<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Панель | КРИСТИНА.AI CRM</title>
<style>
  body{background:#0b132b;color:#e2e8f0;font-family:system-ui;margin:0;padding:20px}
  .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px}
  .btn{padding:8px 16px;background:#3b82f6;color:#fff;border:none;border-radius:8px;cursor:pointer}
  .btn-red{background:#ef4444}
  .card{background:rgba(15,23,42,0.85);padding:16px;border-radius:12px;margin-bottom:16px;border:1px solid rgba(255,255,255,0.08)}
  table{width:100%;border-collapse:collapse;margin-top:10px}
  th,td{padding:10px;text-align:left;border-bottom:1px solid rgba(255,255,255,0.1)}
  input,textarea,select{width:100%;padding:10px;margin:5px 0;border-radius:6px;border:1px solid #3b82f6;background:#050a14;color:#fff;box-sizing:border-box}
  .hidden{display:none}
</style>
</head>
<body>
<div class="header">
  <h2>🤖 КРИСТИНА.AI CRM</h2>
  <div>
    <button class="btn" onclick="showSection('chats')">💬 Чаты</button>
    <button class="btn" onclick="showSection('sites')">🌐 Сайты</button>
    <button class="btn" id="adminBtn" onclick="showSection('admin')" style="display:none">👑 Админ</button>
    <button class="btn btn-red" onclick="logout()">🚪 Выйти</button>
  </div>
</div>

<!-- ЧАТЫ -->
<div id="chats" class="section">
  <div class="card"><h3>Активные диалоги</h3><div id="chatList">Загрузка...</div></div>
  <div class="card hidden" id="chatWindow">
    <h4 id="chatTitle">Выберите чат</h4>
    <div id="messages" style="height:300px;overflow-y:auto;margin:10px 0"></div>
    <div style="display:flex;gap:10px"><input type="text" id="msgInput" placeholder="Сообщение..."><button class="btn" onclick="sendMsg()">Отправить</button></div>
  </div>
</div>

<!-- САЙТЫ -->
<div id="sites" class="section hidden">
  <div class="card">
    <h3>Подключить сайт</h3>
    <div style="display:flex;gap:10px"><input type="text" id="siteUrl" placeholder="https://client-site.com"><button class="btn" onclick="addSite()">➕ Добавить</button></div>
  </div>
  <div class="card" id="siteList">Загрузка сайтов...</div>
</div>

<!-- АДМИНКА -->
<div id="admin" class="section hidden">
  <div class="card">
    <h3>👥 Пользователи</h3>
    <table><thead><tr><th>Логин</th><th>Дата регистрации</th><th>Статус</th><th>Действия</th></tr></thead><tbody id="userTable"></tbody></table>
  </div>
  <div class="card">
    <h3>📢 Сообщение пользователю</h3>
    <select id="targetUser" style="margin-bottom:10px"></select>
    <textarea id="adminMsg" rows="3" placeholder="Текст сообщения..."></textarea>
    <button class="btn" onclick="sendAdminMsg()">Отправить в CRM</button>
  </div>
</div>

<script>
const API = 'https://kristina-crm-api.onrender.com/api';
const token = localStorage.getItem('token');
const isAdmin = localStorage.getItem('isAdmin') === 'true';

if(!token) window.location.href = 'login.html';
if(isAdmin) document.getElementById('adminBtn').style.display = 'inline-block';

function showSection(id){
  document.querySelectorAll('.section').forEach(el=>el.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
  if(id==='chats') loadChats();
  if(id==='sites') loadSites();
  if(id==='admin') loadUsers();
}

function fetchAPI(url, method='GET', body=null){
  return fetch(API+url, {
    method, headers: {'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json'},
    body: body ? JSON.stringify(body) : null
  }).then(r=>r.json());
}

async function loadChats(){
  const chats = await fetchAPI('/chats');
  document.getElementById('chatList').innerHTML = chats.map(c=>`<div style="padding:10px;border-bottom:1px solid rgba(255,255,255,0.1);cursor:pointer" onclick="openChat(${c.id}, '${c.site}')">${c.site} <span style="float:right;color:#94a3b8">${c.status}</span></div>`).join('');
}

async function openChat(id, site){
  document.getElementById('chatWindow').classList.remove('hidden');
  document.getElementById('chatTitle').textContent = site;
  document.getElementById('chatTitle').dataset.id = id;
  const msgs = await fetchAPI(`/messages/${id}`);
  document.getElementById('messages').innerHTML = msgs.map(m=>`<div style="margin:5px 0;padding:8px;background:rgba(0,0,0,0.3);border-radius:8px"><b>${m.sender}:</b> ${m.text}</div>`).join('');
}

function sendMsg(){
  const text = document.getElementById('msgInput').value;
  if(!text) return;
  fetchAPI('/send', 'POST', {chat_id: parseInt(document.getElementById('chatTitle').dataset.id), text}).then(()=>{
    document.getElementById('msgInput').value=''; openChat(document.getElementById('chatTitle').dataset.id, '');
  });
}

async function loadSites(){
  const sites = await fetchAPI('/sites');
  document.getElementById('siteList').innerHTML = sites.map(s=>`<div style="padding:10px;border-bottom:1px solid rgba(255,255,255,0.1)">${s.url} <span style="color:${s.status==='active'?'#4ade80':'#fbbf24'}">● ${s.status}</span></div>`).join('');
}

function addSite(){
  fetchAPI('/sites', 'POST', {url: document.getElementById('siteUrl').value}).then(()=>loadSites());
}

async function loadUsers(){
  const users = await fetchAPI('/admin/users');
  const sel = document.getElementById('targetUser');
  sel.innerHTML = users.map(u=>`<option value="${u.id}">${u.username}</option>`).join('');
  document.getElementById('userTable').innerHTML = users.map(u=>`<tr><td>${u.username}</td><td>${new Date(u.created_at).toLocaleDateString()}</td><td>${u.is_active?'🟢 Активен':'🔴 Отключен'}</td><td><button class="btn" onclick="toggleUser(${u.id})">${u.is_active?'Отключить':'Включить'}</button></td></tr>`).join('');
}

function toggleUser(id){ fetchAPI('/admin/toggle_user', 'POST', {user_id: id}).then(loadUsers); }
function sendAdminMsg(){ fetchAPI('/admin/message', 'POST', {user_id: document.getElementById('targetUser').value, text: document.getElementById('adminMsg').value}).then(()=>alert('Отправлено!')); }
function logout(){ localStorage.clear(); window.location.href='login.html'; }

showSection('chats');
</script>
</body>
</html>
