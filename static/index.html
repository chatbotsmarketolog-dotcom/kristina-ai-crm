<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>КРИСТИНА.AI CRM — Вход</title>
<link rel="icon" type="image/png" href="favicon.png">
<style>
  body{background:#050a14;color:#e2e8f0;font-family:system-ui;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0}
  .card{background:rgba(15,25,45,0.9);padding:2rem;border-radius:20px;border:1px solid #3b82f6;width:100%;max-width:400px;text-align:center}
  h1{color:#60a5fa;margin-bottom:1rem;display:flex;align-items:center;justify-content:center;gap:10px}
  .logo{width:40px;height:40px}
  input{width:100%;padding:12px;margin:8px 0;border-radius:8px;border:1px solid #3b82f6;background:#050a14;color:#fff;box-sizing:border-box}
  button{width:100%;padding:12px;background:#3b82f6;color:#fff;border:none;border-radius:8px;font-weight:bold;cursor:pointer;margin-top:10px}
  button:hover{background:#2563eb}
  .toggle{color:#60a5fa;cursor:pointer;margin-top:15px;display:block;font-size:14px}
  .error{color:#f87171;font-size:13px;margin:10px 0}
  .success{color:#4ade80;font-size:13px;margin:10px 0}
</style>
</head>
<body>
<div class="card">
  <h1><img src="favicon.png" alt="🔐" class="logo" onerror="this.style.display='none'">🔐 Вход в CRM</h1>
  <div class="error" id="err"></div>
  <input type="text" id="u" placeholder="Логин">
  <input type="password" id="p" placeholder="Пароль">
  <button id="btn" onclick="auth('login')">Войти</button>
  <span class="toggle" onclick="toggleMode()">Нет аккаунта? Зарегистрироваться</span>
</div>
<script>
const API = location.origin + '/api';
let isReg = false;

function toggleMode(){
  isReg = !isReg;
  document.getElementById('title').textContent = isReg ? '📝 Регистрация' : '🔐 Вход в CRM';
  document.getElementById('btn').textContent = isReg ? 'Создать аккаунт' : 'Войти';
  document.getElementById('btn').onclick = () => auth(isReg?'register':'login');
  document.getElementById('err').textContent = '';
}

async function auth(type){
  const r = await fetch(`${API}/${type}`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({username: document.getElementById('u').value, password: document.getElementById('p').value})
  });
  const d = await r.json();
  if(d.ok){
    localStorage.setItem('token', d.token);
    localStorage.setItem('isAdmin', d.is_admin || false);
    localStorage.setItem('username', d.username || document.getElementById('u').value);
    window.location.href = 'dashboard.html';
  } else {
    document.getElementById('err').textContent = d.error;
  }
}

document.getElementById('p').onkeypress = function(e) {
  if (e.key === 'Enter') auth(isReg?'register':'login');
};
</script>
</body>
</html>
