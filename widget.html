<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Чат поддержки | КРИСТИНА.AI CRM</title>
<style>
body{margin:0;padding:0;font-family:system-ui;background:transparent;height:100vh;display:flex;flex-direction:column}
#chat-container{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.msg{max-width:85%;padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.4;animation:pop 0.2s ease}
@keyframes pop{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.msg.vis{background:#1e3a8a;color:#fff;align-self:flex-start;border-bottom-left-radius:4px}
.msg.op{background:rgba(59,130,246,0.2);color:#93c5fd;align-self:flex-end;border-bottom-right-radius:4px}
.msg.sys{background:rgba(255,255,255,0.05);color:#94a3b8;align-self:center;font-size:12px;padding:4px 10px;border-radius:20px}
#footer{padding:12px;border-top:1px solid rgba(255,255,255,0.1);display:flex;gap:8px}
#input{flex:1;padding:10px;border-radius:10px;border:1px solid rgba(255,255,255,0.2);background:rgba(0,0,0,0.3);color:#fff;outline:none}
#send{padding:10px 16px;background:#3b82f6;border:none;border-radius:10px;color:#fff;cursor:pointer}
</style></head><body>
<div id="chat-container"><div class="msg sys">💬 Загрузка чата...</div></div>
<div id="footer"><input id="input" placeholder="Введите сообщение..."><button id="send">➤</button></div>
<script>
const path=window.location.pathname, parts=path.split('/'), siteKey=parts[parts.length-1];
const API=window.location.origin.replace('/widget/'+siteKey,'');
let ws, chatId=null;
const area=document.getElementById('chat-container');

function addMsg(t,s){
 const d=document.createElement('div'); d.className='msg '+s; d.textContent=t;
 area.appendChild(d); area.scrollTop=area.scrollHeight;
}

async function init(){
 try{
  const r=await fetch(API+`/api/chat/${siteKey}`,{method:"POST"});
  const d=await r.json(); if(d.error) throw d.error;
  chatId=d.chat_id; area.innerHTML=''; addMsg("Здравствуйте! Чем могу помочь?","sys");
  ws=new WebSocket(`ws://${window.location.host}/ws/visitor/${chatId}`);
  ws.onmessage=e=>{const m=JSON.parse(e.data); addMsg(m.text, m.sender==='operator'?'op':'sys')};
  ws.onclose=()=>addMsg("Связь потеряна. Обновите страницу.","sys");
 }catch(e){area.innerHTML=`<div class="msg sys">❌ ${e}</div>`;}
}

document.getElementById("send").onclick=()=>{
 const i=document.getElementById("input"), t=i.value.trim();
 if(!t||!chatId)return; addMsg(t,"vis"); ws.send(JSON.stringify({text:t})); i.value="";
};
document.getElementById("input").onkeypress=e=>{if(e.key==="Enter")document.getElementById("send").click()};
init();
</script></body></html>
