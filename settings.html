<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Настройки | КРИСТИНА.AI CRM</title>
<style>
:root{--bg:#0b132b;--panel:rgba(15,23,42,0.85);--acc:#3b82f6;--text:#e2e8f0}
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui}
body{background:var(--bg);color:var(--text);min-height:100vh;padding:40px}
.container{max-width:800px;margin:0 auto}
h1{font-size:2rem;margin-bottom:20px}
.card{background:var(--panel);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:24px;margin-bottom:20px}
.back-link{color:#93c5fd;text-decoration:none;display:inline-block;margin-bottom:20px}
.back-link:hover{color:#3b82f6}
input[type="url"]{flex:1;padding:12px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);background:rgba(0,0,0,0.3);color:var(--text)}
button{padding:12px 24px;background:#3b82f6;border:none;border-radius:10px;color:#fff;cursor:pointer}
button:hover{background:#2563eb}
.site-item{background:rgba(0,0,0,0.3);padding:12px;border-radius:8px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.status{padding:4px 12px;border-radius:20px;font-size:12px}
.status-active{background:rgba(34,197,94,0.2);color:#4ade80}
.status-pending{background:rgba(234,179,8,0.2);color:#fbbf24}
.logout-btn{padding:12px 24px;background:#ef4444;border:none;border-radius:10px;color:#fff;cursor:pointer}
</style>
</head>
<body>
<div class="container">
  <a href="/dashboard" class="back-link">← Назад к чатам</a>
  <h1>⚙️ Настройки</h1>
  <div class="card">
    <h2 style="margin-bottom:12px">Подключение сайтов</h2>
    <p style="color:#94a3b8;margin-bottom:16px">Добавьте домен вашего сайта для подключения чата</p>
    <form id="siteForm" style="display:flex;gap:12px;margin-bottom:20px">
      <input type="url" id="urlInput" placeholder="https://client-site.com" required>
      <button type="submit">➕ Добавить</button>
    </form>
    <div id="siteList"></div>
  </div>
  <div class="card">
    <button class="logout-btn" onclick="logout()">🚪 Выйти из системы</button>
  </div>
</div>
<script>
const token = localStorage.getItem('kristina_crm_token');
if (!token) window.location.href = '/login';

const API = location.origin;

async function loadSites() {
  try {
    const r = await fetch(API + "/api/websites", {
      headers: { Authorization: `Bearer ${token}` }
    });
    if (r.status === 401) {
      logout();
      return;
    }
    const sites = await r.json();
    const el = document.getElementById("siteList");
    if (!sites.length) {
      el.innerHTML = "<p style='color:#94a3b8'>Нет подключённых сайтов</p>";
      return;
    }
    el.innerHTML = sites.map(s => `
      <div class="site-item">
        <div>
          <div style="font-weight:600">${s.url}</div>
          <div style="font-size:12px;color:#94a3b8;font-family:monospace">${s.api_key}</div>
        </div>
        <span class="status ${s.status==='active'?'status-active':'status-pending'}">${s.status==='active'?'✅ Активен':'⏳ Ожидание'}</span>
      </div>
    `).join("");
  } catch (e) {
    console.error("Error loading sites:", e);
  }
}

document.getElementById("siteForm").onsubmit = async (e) => {
  e.preventDefault();
  const url = document.getElementById("urlInput").value;
  try {
    const r = await fetch(API + "/api/websites", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        Authorization: `Bearer ${token}`
      },
      body: JSON.stringify({ url })
    });
    if (r.ok) {
      document.getElementById("urlInput").value = "";
      loadSites();
    }
  } catch (e) {
    console.error("Error adding site:", e);
  }
};

function logout() {
  localStorage.removeItem('kristina_crm_token');
  window.location.href = '/login';
}

loadSites();
</script>
</body>
</html>
