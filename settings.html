<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Настройки | КРИСТИНА.AI CRM</title>
<style>
:root{--bg:#0b132b;--card:rgba(30,58,138,0.35);--acc:#3b82f6;--soft:#93c5fd;--text:#e2e8f0}
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,-apple-system,sans-serif}
body{background:var(--bg);color:var(--text);min-height:100vh;padding:40px 20px}
.container{max-width:900px;margin:0 auto}
h1{font-size:2.2rem;margin-bottom:8px;background:linear-gradient(135deg,var(--acc),var(--soft));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{opacity:0.7;margin-bottom:30px}
.card{background:var(--card);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:24px;margin-bottom:24px}
.form-row{display:flex;gap:12px;flex-wrap:wrap}
input{flex:1;padding:12px 16px;border-radius:10px;border:1px solid rgba(255,255,255,0.15);background:rgba(0,0,0,0.2);color:var(--text)}
button{padding:12px 20px;border:none;border-radius:10px;background:linear-gradient(145deg,#3b82f6,#2563eb);color:#fff;font-weight:600;cursor:pointer}
.site-list{display:grid;gap:16px;margin-top:20px}
.site-item{background:rgba(15,23,42,0.6);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:16px}
.meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:10px}
.key{font-family:monospace;background:rgba(0,0,0,0.3);padding:6px 12px;border-radius:8px;font-size:12px;color:var(--soft)}
.tabs{display:flex;gap:8px;margin:12px 0;border-bottom:1px solid rgba(255,255,255,0.1);padding-bottom:8px}
.tab{padding:8px 16px;border-radius:8px;font-size:13px;cursor:pointer;opacity:0.7}
.tab.active{background:rgba(59,130,246,0.2);opacity:1;color:var(--acc)}
.code-block{background:#020617;padding:12px;border-radius:8px;font-family:monospace;font-size:12px;overflow-x:auto;margin:8px 0;position:relative;border:1px dashed rgba(255,255,255,0.1)}
.copy-btn{position:absolute;top:8px;right:8px;padding:6px 12px;font-size:11px;background:rgba(255,255,255,0.1);border:none;color:var(--text);cursor:pointer;border-radius:6px}
.badge{display:inline-block;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;background:rgba(59,130,246,0.2);color:var(--acc)}
.nav{position:fixed;top:20px;right:20px}
.nav a{color:var(--soft);text-decoration:none;font-weight:500;margin-left:16px}
</style></head><body>
<div class="nav"><a href="/dashboard">👨‍ Чаты</a><a href="#" onclick="logout()">Выйти</a></div>
<div class="container">
 <h1>🔗 Подключение сайтов</h1>
 <p class="sub">Добавьте домен. Клиенту достаточно вставить 1 строку скрипта.</p>
 <div class="card">
  <form id="siteForm" class="form-row">
   <input type="url" id="urlInput" placeholder="https://client-site.com" required>
   <button type="submit">➕ Добавить</button>
  </form>
  <div id="siteList" class="site-list"></div>
 </div>
</div>
<script>
const API=location.origin, token=localStorage.getItem('token');
if(!token) window.location.href='/login';
function logout(){localStorage.removeItem('token');window.location.href='/login'}

async function load(){
 const r=await fetch(API+"/api/websites",{headers:{Authorization:`Bearer ${token}`}}); 
 const sites=await r.json();
 const el=document.getElementById("siteList"); el.innerHTML="";
 if(!sites.length) {el.innerHTML="<p style='text-align:center;opacity:0.5;padding:20px'>Нет сайтов</p>"; return;}
 sites.forEach(s=>{
  const scriptTag=`<script src="${API}/auto.js" async><\/script>`;
  el.innerHTML+=`<div class="site-item">
   <div class="meta"><span class="badge">${s.url}</span><span class="key">${s.api_key}</span></div>
   <div class="tabs">
    <div class="tab active" onclick="showTab(this,'script',this.parentElement)">⚡ Скрипт (для клиента)</div>
   </div>
   <div class="tab-content" data-tab="script"><div class="code-block"><button class="copy-btn" onclick="copy(this,'${scriptTag.replace(/'/g,"\\'")}')">📋 Копировать</button><code>${scriptTag}</code></div><p style="font-size:12px;opacity:0.6;margin-top:6px">Клиент вставляет это в любой блок HTML на своём сайте.</p></div>
  </div>`;
 });
}
function showTab(el, tab, container){
 container.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
 el.classList.add('active');
 container.parentElement.querySelectorAll('.tab-content').forEach(c=>c.style.display='none');
 container.parentElement.querySelector(`[data-tab="${tab}"]`).style.display='block';
}
function copy(btn, code){navigator.clipboard.writeText(code);btn.textContent='✅';setTimeout(()=>btn.textContent='📋 Копировать',2000);}
document.getElementById("siteForm").onsubmit=async e=>{
 e.preventDefault(); const u=document.getElementById("urlInput").value;
 await fetch(API+"/api/websites",{method:"POST",headers:{"Content-Type":"application/json",Authorization:`Bearer ${token}`},body:JSON.stringify({url:u})});
 document.getElementById("urlInput").value=""; load();
}
load();
</script></body></html>
